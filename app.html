<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Leak — Find where your café is bleeding money</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LEAK — design tokens (first-pass premium dark)
   ============================================================ */
:root{
  /* light, friendly, mass-appeal — violet brand */
  --bg:#f4f3fa;
  --bg-2:#ffffff;
  --surface:#ffffff;
  --surface-2:#faf9fe;
  --surface-3:#efedf8;
  --line:rgba(34,28,46,.09);
  --line-2:rgba(34,28,46,.15);
  --ink:#211c2e;
  --ink-soft:#4b4559;
  --muted:#857f93;
  --muted-2:#a39db2;
  --brand:#6d28d9;
  --brand-2:#7c3aed;
  --brand-soft:rgba(109,40,217,.08);
  --brand-line:rgba(109,40,217,.22);
  --green:#199a66;
  --green-soft:rgba(25,154,102,.10);
  --green-line:rgba(25,154,102,.26);
  --leak:#df5a36;
  --leak-2:#e0552f;
  --leak-soft:rgba(223,90,54,.09);
  --leak-line:rgba(223,90,54,.26);
  --amber:#cf962a;
  --amber-soft:rgba(207,150,42,.13);
  --radius:18px;
  --radius-sm:12px;
  --radius-lg:24px;
  --maxw:1140px;
  --shadow:0 1px 2px rgba(34,28,46,.05), 0 12px 30px -16px rgba(34,28,46,.16);
  --font:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);
  -webkit-font-smoothing:antialiased;line-height:1.55;letter-spacing:-.011em;
  font-size:16px;
}
body{background:
  radial-gradient(1100px 640px at 82% -10%, rgba(124,58,237,.06), transparent 60%),
  var(--bg);
}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:-.028em;line-height:1.08}
p{margin:0}
::selection{background:rgba(124,58,237,.18)}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
/* distinctive display face — used only for hero moments & big numbers */
.hero-h,.rc-big,.headline .big,.rep-title,h2.sec-h,.greet,.kpi .v,.latest .lv,
.price .amt,.bill-plan,.an-h,.ob-h,.auth-h,.lc-impact .iv,.act-tally .v,.hleak{
  font-family:var(--display);font-optical-sizing:auto;font-weight:560;letter-spacing:-.035em}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  border:1px solid transparent;border-radius:12px;padding:.78rem 1.15rem;
  font-size:.95rem;font-weight:600;cursor:pointer;transition:.16s ease;
  white-space:nowrap;letter-spacing:-.01em;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--brand);color:#fff;font-weight:650;box-shadow:0 10px 24px -12px rgba(109,40,217,.5)}
.btn-primary:hover{background:var(--brand-2);transform:translateY(-1px)}
.btn-ghost{background:var(--surface-2);color:var(--ink);border-color:var(--line-2)}
.btn-ghost:hover{background:var(--surface-3);border-color:rgba(240,232,218,.22)}
.btn-quiet{background:transparent;color:var(--muted);border-color:var(--line)}
.btn-quiet:hover{color:var(--ink);border-color:var(--line-2)}
.btn-danger{background:transparent;color:#e89175;border-color:var(--leak-line)}
.btn-danger:hover{background:var(--leak-soft)}
.btn-lg{padding:1rem 1.6rem;font-size:1.04rem;border-radius:13px}
.btn-block{width:100%}
.btn-sm{padding:.5rem .8rem;font-size:.86rem}

/* ---------- badges ---------- */
.badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.74rem;font-weight:650;
  padding:.28rem .6rem;border-radius:999px;letter-spacing:.01em;border:1px solid var(--line-2)}
.badge-dot{width:6px;height:6px;border-radius:999px;background:currentColor}
.b-leak{color:var(--leak);background:var(--leak-soft);border-color:var(--leak-line)}
.b-green{color:var(--green);background:var(--green-soft);border-color:var(--green-line)}
.b-amber{color:#9a7218;background:var(--amber-soft);border-color:rgba(207,150,42,.32)}
.b-muted{color:var(--muted);background:var(--surface-2);border-color:var(--line)}
.conf{font-size:.72rem;font-weight:650;color:var(--muted);display:inline-flex;align-items:center;gap:.45rem}
.conf .bars{display:inline-flex;gap:2px}
.conf .bars i{width:4px;height:11px;border-radius:1px;background:var(--surface-3);display:inline-block}
.conf.high .bars i{background:var(--green)}
.conf.medium .bars i:nth-child(-n+2){background:var(--amber)}
.conf.low .bars i:nth-child(-n+1){background:var(--leak)}

/* ---------- cards / inputs ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
/* light-theme card lift */
.step,.find,.price,.secitem,.set-card,.leakcard,.billcard,.latest,.actions,.problem,.note-prev,.headline{box-shadow:var(--shadow)}
.eyebrow{font-size:.78rem;font-weight:680;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2)}
label.f{display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);margin:0 0 .4rem}
.hint{font-size:.8rem;color:var(--muted-2)}
.input,.select,.textarea{
  width:100%;background:var(--bg-2);border:1px solid var(--line-2);color:var(--ink);
  border-radius:11px;padding:.72rem .85rem;font-size:.95rem;font-family:inherit;transition:.15s;
}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--green-line);box-shadow:0 0 0 3px rgba(95,199,148,.12)}
.textarea{resize:vertical;min-height:96px}
.select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239a9da4' stroke-width='2.4'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right .85rem center;padding-right:2.2rem}
.field{margin-bottom:1.05rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}

/* ---------- realism: timestamps, data-quality, notes, sources ---------- */
.meta-line{font-size:.78rem;color:var(--muted-2);display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
.meta-line .dotsep{width:3px;height:3px;border-radius:99px;background:var(--muted-2);display:inline-block;opacity:.55}
.dq{display:flex;gap:.7rem;align-items:flex-start;background:var(--amber-soft);border:1px solid rgba(216,168,90,.28);border-radius:12px;padding:14px 16px;margin-top:16px}
.dq svg{width:16px;height:16px;color:var(--amber);flex:0 0 auto;margin-top:2px}
.dq .dqt{font-size:.9rem;color:var(--ink-soft);line-height:1.55}
.dq .dqt b{color:var(--amber);font-weight:650}
.dq .dqt .fn{font-variant-numeric:tabular-nums;color:var(--muted);background:var(--bg-2);border:1px solid var(--line);border-radius:5px;padding:.05rem .3rem;font-size:.84rem}
.src{font-size:.76rem;color:var(--muted-2);margin-top:.8rem;display:flex;align-items:center;gap:.45rem;line-height:1.4}
.src svg{width:12px;height:12px;opacity:.7;flex:0 0 auto}
.note-prev{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:15px 17px;margin-bottom:14px}
.note-prev .nph{display:flex;align-items:center;gap:.55rem;font-size:.75rem;color:var(--muted-2);margin-bottom:.55rem}
.note-prev .nph .who{color:var(--ink-soft);font-weight:600}
.note-prev .npb{font-size:.95rem;color:var(--ink-soft);line-height:1.6;font-style:italic}
.closed{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:650;color:var(--green);background:var(--green-soft);border:1px solid var(--green-line);border-radius:999px;padding:.26rem .6rem}
.closed svg{width:11px;height:11px}
.fchip.err{color:var(--leak);border-color:var(--leak-line);background:var(--leak-soft)}
.fchip.err svg{color:var(--leak)}
.fchip .fsz{margin-left:auto;color:var(--muted-2);font-size:.73rem}
.fchip .fx{margin-left:auto;color:var(--muted-2);font-size:.73rem}
.hist-gap{display:flex;align-items:center;gap:.75rem;padding:16px 20px;color:var(--muted-2);font-size:.85rem;font-style:italic;background:var(--bg-2);border:1px solid var(--line);border-radius:14px}
.hist-gap svg{width:15px;height:15px;flex:0 0 auto}
.invtab{width:100%;border-collapse:collapse;margin-top:8px}
.invtab td{padding:13px 0;border-bottom:1px solid var(--line);font-size:.9rem}
.invtab tr:last-child td{border-bottom:none}
.invtab .amt{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink-soft)}
.invtab .lk{color:var(--muted);text-align:right}
.invtab .lk a{border-bottom:1px solid var(--line-2);padding-bottom:1px}
.invtab .st{color:var(--green);font-size:.8rem}

/* ============================================================
   ROUTING
   ============================================================ */
.page{display:none}
.page.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============================================================
   MARKETING shell
   ============================================================ */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}
.topnav{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:rgba(255,255,255,.8);border-bottom:1px solid var(--line)}
.topnav .row{display:flex;align-items:center;justify-content:space-between;height:66px}
.brand{display:flex;align-items:center;gap:.6rem;font-weight:720;letter-spacing:-.03em;font-size:1.18rem}
.brand .drop{width:22px;height:22px;position:relative}
.nav-links{display:flex;gap:1.7rem;align-items:center}
.nav-links a{font-size:.92rem;color:var(--muted);font-weight:550;transition:.15s}
.nav-links a:hover{color:var(--ink)}
.nav-cta{display:flex;gap:.6rem;align-items:center}
@media(max-width:860px){.nav-links{display:none}.nav-cta .ghost-hide{display:none}}

/* hero */
.hero{padding:96px 0 44px}
.hero-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:64px;align-items:center}
@media(max-width:960px){.hero-grid{grid-template-columns:1fr;gap:44px}.hero{padding:56px 0 12px}}
.h-tag{display:inline-flex;align-items:center;gap:.55rem;font-size:.72rem;font-weight:550;color:var(--muted-2);
  letter-spacing:.16em;text-transform:uppercase;margin-bottom:1.9rem}
h1.hero-h{font-size:clamp(2.8rem,6.6vw,4.9rem);line-height:.98;letter-spacing:-.038em;font-weight:560}
h1.hero-h .accent{color:var(--leak);font-style:italic}
.hero-sub{margin-top:1.7rem;font-size:1.2rem;color:var(--muted);max-width:34ch;line-height:1.5}
.hero-btns{display:flex;gap:.8rem;margin-top:2.4rem;flex-wrap:wrap;align-items:center}
.trust{margin-top:1.9rem;font-size:.85rem;color:var(--muted-2);display:flex;align-items:center;gap:.5rem}

/* hero report card */
.reportcard{background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line-2);border-radius:var(--radius-lg);padding:26px;
  box-shadow:0 40px 90px -40px rgba(0,0,0,.9), 0 1px 0 rgba(255,255,255,.05) inset;position:relative;overflow:hidden}
.reportcard:before{content:"";position:absolute;inset:0;background:radial-gradient(420px 200px at 85% -10%,rgba(223,106,67,.16),transparent 60%);pointer-events:none}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.4rem}
.rc-label{font-size:.8rem;color:var(--muted);font-weight:600}
.rc-big{font-size:3.1rem;font-weight:700;letter-spacing:-.04em;line-height:1;margin:.35rem 0 .2rem;color:var(--ink)}
.rc-big .cur{color:var(--leak);font-size:1.7rem;vertical-align:.55rem;margin-right:.1rem}
.rc-sub{font-size:.84rem;color:var(--muted)}
.rc-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:18px 0}
.minicard{background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:12px 13px}
.minicard .t{font-size:.78rem;color:var(--muted);font-weight:550}
.minicard .v{font-size:1.18rem;font-weight:680;margin-top:.25rem;color:var(--leak)}
.rc-check{border-top:1px solid var(--line);padding-top:14px}
.rc-check .h{font-size:.74rem;font-weight:680;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:.7rem}
.rc-check ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.55rem}
.rc-check li{display:flex;gap:.6rem;align-items:flex-start;font-size:.9rem;color:var(--ink-soft)}
.tick{flex:0 0 auto;width:17px;height:17px;border-radius:5px;background:var(--green-soft);border:1px solid var(--green-line);
  color:var(--green);display:grid;place-items:center;margin-top:1px}
.tick svg{width:11px;height:11px}

/* section scaffold */
.section{padding:100px 0}
.section.tight{padding:66px 0}
.sec-head{max-width:46ch}
h2.sec-h{font-size:clamp(1.9rem,4vw,2.9rem);letter-spacing:-.035em;font-weight:560;line-height:1.02}
.sec-lead{margin-top:1.1rem;color:var(--muted);font-size:1.1rem;line-height:1.55}
.divider{height:1px;background:var(--line);max-width:var(--maxw);margin:0 auto}

/* problem band */
.problem{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:42px}
.problem p{font-size:1.22rem;line-height:1.6;color:var(--ink-soft);max-width:62ch;letter-spacing:-.015em}
.problem .pull{color:var(--leak);font-weight:600}
@media(max-width:560px){.problem{padding:26px}.problem p{font-size:1.08rem}}

/* steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:34px}
@media(max-width:760px){.steps{grid-template-columns:1fr}}
.step{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;position:relative}
.step .n{font-size:.78rem;font-weight:700;color:var(--brand);letter-spacing:.1em}
.step h3{font-size:1.18rem;margin:.7rem 0 .5rem}
.step p{color:var(--muted);font-size:.94rem}

/* finds grid */
.finds{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:34px}
@media(max-width:900px){.finds{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.finds{grid-template-columns:1fr}}
.find{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;transition:.16s}
.find:hover{border-color:var(--line-2);background:var(--surface-2)}
.find .dot{width:8px;height:8px;border-radius:999px;background:var(--leak);margin-bottom:12px}
.find h4{font-size:1rem;font-weight:620}
.find p{font-size:.85rem;color:var(--muted);margin-top:.35rem}

/* pricing */
.prices{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:38px;max-width:860px}
@media(max-width:720px){.prices{grid-template-columns:1fr}}
.price{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:30px;position:relative}
.price.feat{border-color:var(--green-line);background:linear-gradient(180deg,rgba(95,199,148,.06),var(--surface))}
.price .tier{font-size:.82rem;font-weight:680;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.price .amt{font-size:2.7rem;font-weight:700;letter-spacing:-.04em;margin:.5rem 0 0}
.price .amt span{font-size:1rem;color:var(--muted);font-weight:500;letter-spacing:0}
.price ul{list-style:none;margin:1.4rem 0;padding:0;display:flex;flex-direction:column;gap:.7rem}
.price li{display:flex;gap:.6rem;font-size:.92rem;color:var(--ink-soft);align-items:flex-start}
.price li .tick{width:16px;height:16px}
.flag{position:absolute;top:-11px;right:24px;font-size:.7rem;font-weight:700;letter-spacing:.08em;
  background:var(--green);color:#06210f;padding:.3rem .65rem;border-radius:999px}

/* faq */
.faq{max-width:760px;margin-top:30px}
.qitem{border-bottom:1px solid var(--line)}
.qitem button{width:100%;background:none;border:none;color:var(--ink);text-align:left;
  padding:20px 0;font-size:1.06rem;font-weight:560;cursor:pointer;display:flex;justify-content:space-between;gap:1rem;align-items:center}
.qitem .ans{max-height:0;overflow:hidden;transition:max-height .28s ease;color:var(--muted)}
.qitem.open .ans{max-height:200px}
.qitem .ans p{padding:0 0 20px;font-size:.98rem}
.qitem .pm{flex:0 0 auto;color:var(--muted);transition:.25s}
.qitem.open .pm{transform:rotate(45deg);color:var(--green)}

/* security */
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:32px}
@media(max-width:820px){.sec-grid{grid-template-columns:1fr}}
.secitem{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px}
.secitem .ic{width:34px;height:34px;border-radius:10px;background:var(--green-soft);border:1px solid var(--green-line);
  color:var(--green);display:grid;place-items:center;margin-bottom:14px}
.secitem .ic svg{width:17px;height:17px}
.secitem h4{font-size:1.02rem}
.secitem p{font-size:.88rem;color:var(--muted);margin-top:.4rem}

/* cta band */
.ctaband{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line-2);
  border-radius:var(--radius-lg);padding:48px;text-align:center;position:relative;overflow:hidden}
.ctaband:before{content:"";position:absolute;inset:0;background:radial-gradient(500px 220px at 50% -30%,rgba(95,199,148,.12),transparent);pointer-events:none}

/* footer */
.foot{border-top:1px solid var(--line);padding:40px 0;color:var(--muted-2);font-size:.86rem}
.foot .row{display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;align-items:center}
.foot a{color:var(--muted)}
.foot a:hover{color:var(--ink)}

/* ============================================================
   AUTH
   ============================================================ */
.authwrap{min-height:100vh;display:grid;place-items:center;padding:40px 20px}
.authcard{width:100%;max-width:420px}
.authcard .card{padding:34px}
.auth-brand{display:flex;align-items:center;gap:.55rem;justify-content:center;font-weight:720;font-size:1.2rem;margin-bottom:6px}
.auth-h{font-size:1.5rem;text-align:center;margin-top:1.2rem}
.auth-sub{text-align:center;color:var(--muted);font-size:.92rem;margin:.5rem 0 1.6rem}
.auth-foot{text-align:center;font-size:.88rem;color:var(--muted);margin-top:1.3rem}
.auth-foot a{color:var(--brand);font-weight:600}
.oauth{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.1rem}
.divider-or{display:flex;align-items:center;gap:.8rem;color:var(--muted-2);font-size:.78rem;margin:1.1rem 0}
.divider-or:before,.divider-or:after{content:"";flex:1;height:1px;background:var(--line)}

/* ============================================================
   APP shell
   ============================================================ */
.app{display:none;min-height:100vh}
body.app-mode .app{display:grid;grid-template-columns:248px 1fr}
/* report + analysis pages render the app shell without app-mode */
.page.active .app{display:grid;grid-template-columns:248px 1fr}
.page.active #reportApp,.page.active .analysis-shell{min-height:100vh}
.sidebar{background:var(--bg-2);border-right:1px solid var(--line);padding:20px 14px;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{display:flex;align-items:center;gap:.55rem;font-weight:720;font-size:1.12rem;padding:6px 8px 18px}
.sb-cafe{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:16px}
.sb-cafe .nm{font-size:.92rem;font-weight:620}
.sb-cafe .lo{font-size:.78rem;color:var(--muted-2);margin-top:1px}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.sb-nav a{display:flex;align-items:center;gap:.7rem;padding:.62rem .7rem;border-radius:10px;
  color:var(--muted);font-size:.92rem;font-weight:550;cursor:pointer;transition:.13s}
.sb-nav a svg{width:17px;height:17px;opacity:.85}
.sb-nav a:hover{background:var(--surface);color:var(--ink)}
.sb-nav a.on{background:var(--brand-soft);color:var(--brand);font-weight:600}
.sb-nav a.on svg{color:var(--brand);opacity:1}
.sb-sec{font-size:.68rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted-2);padding:14px 10px 6px}
.sb-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
.sb-plan{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:var(--muted);padding:.4rem .6rem}

.main{min-width:0;display:flex;flex-direction:column;min-height:100vh}
.apphead{height:64px;border-bottom:none;display:flex;align-items:center;justify-content:space-between;
  padding:0 26px;position:sticky;top:0;background:linear-gradient(90deg,var(--brand),var(--brand-2));z-index:20;
  box-shadow:0 8px 24px -16px rgba(109,40,217,.6)}
.apphead .ttl{font-size:1.05rem;font-weight:700;color:#fff}
.apphead .right{display:flex;align-items:center;gap:.8rem}
.apphead .meta-line{color:rgba(255,255,255,.82)}
.apphead .meta-line .dotsep{background:rgba(255,255,255,.6)}
.apphead .btn-primary{background:#fff;color:var(--brand);box-shadow:none}
.apphead .btn-primary:hover{background:#f4f0fd}
.apphead .btn-quiet{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.32)}
.apphead .btn-quiet:hover{color:#fff;border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.08)}
.avatar{width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.45);display:grid;place-items:center;font-size:.8rem;font-weight:700;color:#fff}
.burger{display:none;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);border-radius:9px;width:38px;height:38px;cursor:pointer;color:#fff}
.content{padding:30px 26px 60px;max-width:1040px;width:100%;margin:0 auto;flex:1}
@media(max-width:880px){
  body.app-mode .app, .page.active .app{grid-template-columns:1fr}
  .sidebar{position:fixed;z-index:60;width:270px;transform:translateX(-100%);transition:.22s}
  body.nav-open .sidebar{transform:none;box-shadow:0 0 0 100vmax rgba(0,0,0,.5)}
  .burger{display:grid;place-items:center}
  .content{padding:22px 16px 50px}
  .apphead{padding:0 16px}
}
@media(max-width:620px){.apphead .meta-line{display:none}}

/* dashboard */
.greet{font-size:1.7rem;letter-spacing:-.03em;font-weight:640}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:32px}
@media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.kpis{grid-template-columns:1fr}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
.kpi .k{font-size:.78rem;color:var(--muted);font-weight:500;letter-spacing:.01em}
.kpi .v{font-size:1.95rem;letter-spacing:-.03em;margin-top:.6rem;line-height:1}
.kpi .v.leak{color:var(--leak)}
.kpi .v.green{color:var(--green)}
.kpi .meta{font-size:.78rem;color:var(--muted-2);margin-top:.55rem}

.latest{margin-top:24px;background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line-2);border-radius:var(--radius-lg);padding:26px;position:relative;overflow:hidden}
.latest:before{content:"";position:absolute;inset:0;background:radial-gradient(420px 180px at 90% -20%,rgba(223,106,67,.12),transparent 60%);pointer-events:none}
.latest-row{display:flex;justify-content:space-between;gap:20px;align-items:center;flex-wrap:wrap}
.latest .lh{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:680}
.latest .lv{font-size:2.4rem;font-weight:700;letter-spacing:-.04em;margin:.4rem 0 .2rem}
.latest .lv .cur{color:var(--leak);font-size:1.4rem;vertical-align:.4rem}
.latest .lmeta{display:flex;gap:1.4rem;flex-wrap:wrap;margin-top:.6rem}
.latest .lmeta div{font-size:.84rem;color:var(--muted)}
.latest .lmeta b{color:var(--ink);font-weight:600}
.quick{display:flex;gap:.7rem;margin-top:22px;flex-wrap:wrap}

/* ---------- dashboard graphs ---------- */
.dash-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px;margin-top:18px}
.dash-h{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
.dash-sub{font-size:.84rem;color:var(--muted);margin-top:2px}
.health{display:grid;grid-template-columns:240px 1fr;gap:30px;align-items:center;margin-top:18px}
@media(max-width:680px){.health{grid-template-columns:1fr;gap:16px}}
.gauge-wrap{position:relative;width:240px;max-width:100%;margin:0 auto}
.gauge-wrap svg{display:block;width:100%;height:auto}
.gauge-val{position:absolute;left:0;right:0;bottom:8px;text-align:center}
.gauge-val .score{font-family:var(--display);font-size:2.7rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.gauge-val .slabel{font-size:.82rem;color:var(--amber);font-weight:700;margin-top:2px}
.gscale{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted-2);margin-top:-6px;padding:0 6px}
.health-copy p{font-size:.98rem;color:var(--ink-soft);line-height:1.62}
.health-copy .delta{color:var(--green);font-weight:600;font-size:.84rem;margin-top:.7rem;display:inline-flex;gap:.35rem;align-items:center}

.donuts{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
@media(max-width:680px){.donuts{grid-template-columns:1fr}}
.donut-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px;text-align:center}
.donut-card .dt{font-size:.86rem;color:var(--muted);font-weight:600}
.donut{width:124px;height:124px;margin:14px auto 12px;position:relative}
.donut svg{transform:rotate(-90deg)}
.donut .dval{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .dval b{font-family:var(--display);font-weight:800;font-size:1.55rem;letter-spacing:-.02em;line-height:1}
.donut .dval small{font-size:.7rem;font-weight:500;color:var(--muted);margin-top:3px}
.pill{display:inline-block;font-size:.74rem;font-weight:600;padding:.28rem .7rem;border-radius:999px}
.pill.bad{background:var(--leak-soft);color:var(--leak)}
.pill.good{background:var(--green-soft);color:var(--green)}
.pill.warn{background:var(--amber-soft);color:#9a7218}
.donut-foot{font-size:.78rem;color:var(--muted-2);margin-top:10px}

.bars-h{display:flex;flex-direction:column;gap:15px;margin-top:18px}
.barrow{display:grid;grid-template-columns:130px 1fr 56px;gap:14px;align-items:center}
.barrow .blabel{font-size:.92rem;color:var(--ink-soft)}
.bartrack{height:12px;background:var(--surface-3);border-radius:999px;overflow:hidden}
.barfill{height:100%;background:var(--leak);border-radius:999px}
.barrow .bval{font-size:.92rem;font-weight:700;color:var(--leak);font-variant-numeric:tabular-nums;text-align:right}
@media(max-width:560px){.barrow{grid-template-columns:96px 1fr 50px;gap:10px}.barrow .blabel{font-size:.84rem}}

/* upload */
.up-cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 4px}
@media(max-width:620px){.up-cats{grid-template-columns:1fr}}
.upcard{background:var(--surface);border:1px dashed var(--line-2);border-radius:14px;padding:18px;transition:.15s;cursor:pointer}
.upcard:hover{border-color:var(--green-line);background:var(--surface-2)}
.upcard.has{border-style:solid;border-color:var(--green-line);background:linear-gradient(180deg,rgba(95,199,148,.05),var(--surface))}
.upcard .uh{display:flex;justify-content:space-between;align-items:center}
.upcard .un{font-weight:600;font-size:.96rem}
.upcard .ud{font-size:.82rem;color:var(--muted);margin-top:.3rem}
.upcard .files{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.fchip{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--ink-soft);
  background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:.4rem .55rem}
.fchip svg{width:13px;height:13px;color:var(--green)}
.up-note{background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--green);
  border-radius:10px;padding:14px 16px;font-size:.9rem;color:var(--ink-soft);margin:18px 0}

/* analysis */
.analysis{min-height:calc(100vh - 64px);display:grid;place-items:center;padding:40px 20px}
.analysis .inner{width:100%;max-width:520px;text-align:center}
.spinwrap{width:84px;height:84px;margin:0 auto 26px;position:relative}
.spinwrap .ring{position:absolute;inset:0;border-radius:999px;border:2px solid var(--line)}
.spinwrap .ring.go{border-top-color:var(--green);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinwrap .drop2{position:absolute;inset:0;display:grid;place-items:center}
.an-h{font-size:1.4rem;letter-spacing:-.03em}
.an-sub{color:var(--muted);margin:.7rem auto 0;max-width:36ch;font-size:.96rem}
.an-steps{margin:30px auto 0;text-align:left;display:flex;flex-direction:column;gap:9px;max-width:380px}
.an-step{display:flex;align-items:center;gap:.8rem;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px;font-size:.92rem;color:var(--muted);transition:.3s}
.an-step .box{width:20px;height:20px;border-radius:6px;border:1px solid var(--line-2);flex:0 0 auto;display:grid;place-items:center}
.an-step .box svg{width:12px;height:12px;opacity:0;transition:.2s}
.an-step.active{color:var(--ink);border-color:var(--line-2);background:var(--surface-2)}
.an-step.done{color:var(--ink-soft)}
.an-step.done .box{background:var(--green-soft);border-color:var(--green-line);color:var(--green)}
.an-step.done .box svg{opacity:1}
.an-step.active .box{border-color:var(--green);position:relative}
.an-step.active .box:after{content:"";position:absolute;inset:3px;border-radius:3px;background:var(--green);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ============================================================
   LEAK WEEKLY REPORT — the hero screen
   ============================================================ */
.report{max-width:880px;margin:0 auto}
.rep-head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.rep-kicker{display:flex;align-items:center;gap:.6rem;color:var(--muted);font-size:.84rem;font-weight:560}
.rep-title{font-size:2.4rem;letter-spacing:-.035em;margin-top:.5rem;font-weight:560}
.rep-cafe{color:var(--muted);font-size:.96rem;margin-top:.3rem}
.rep-actions{display:flex;gap:.5rem;flex-wrap:wrap}

/* the money headline */
.headline{margin-top:24px;background:
  radial-gradient(600px 240px at 80% -30%,rgba(223,106,67,.16),transparent 62%),
  linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--leak-line);border-radius:var(--radius-lg);padding:32px;position:relative;overflow:hidden}
.headline .lbl{font-size:.86rem;color:var(--ink-soft);font-weight:560;display:flex;align-items:center;gap:.5rem}
.headline .big{font-size:clamp(3.8rem,12vw,6rem);font-weight:600;letter-spacing:-.05em;line-height:.9;margin:.45rem 0 .15rem;color:var(--ink)}
.headline .big .cur{color:var(--leak);font-size:.4em;vertical-align:.72em;margin-right:.06em}
.headline .annual{font-size:1.04rem;color:var(--leak);font-weight:550;margin-top:.5rem}
.headline .annual span{color:var(--muted)}
.headline-foot{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:22px;
  padding-top:20px;border-top:1px solid var(--line)}
.spark{display:flex;align-items:flex-end;gap:5px;height:42px}
.spark i{width:9px;border-radius:3px 3px 0 0;background:var(--surface-3);display:block}
.spark i.now{background:var(--leak)}
.spark-wrap{display:flex;align-items:center;gap:14px}
.spark-cap{font-size:.78rem;color:var(--muted-2);line-height:1.4}

/* value / ROI band — the persuasion engine */
.valueband{margin-top:14px;background:linear-gradient(180deg,rgba(95,199,148,.07),var(--surface));
  border:1px solid var(--green-line);border-radius:var(--radius);padding:22px 24px;
  display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:18px;align-items:center}
.vb-cell .vl{font-size:.76rem;color:var(--muted);font-weight:560;letter-spacing:.02em}
.vb-cell .vv{font-size:1.55rem;font-weight:720;letter-spacing:-.03em;margin-top:.25rem}
.vb-cell .vv.green{color:var(--green)}
.vb-op{font-size:1.4rem;color:var(--muted-2);font-weight:300}
.vb-roi{font-size:.84rem;color:var(--ink-soft);margin-top:.2rem}
@media(max-width:740px){
  .valueband{grid-template-columns:1fr 1fr;gap:16px}
  .vb-op{display:none}
}
.payoff{margin-top:12px;display:flex;gap:.6rem;align-items:center;font-size:.92rem;color:var(--ink-soft);
  background:var(--green-soft);border:1px solid var(--green-line);border-radius:12px;padding:13px 16px}
.payoff b{color:var(--green)}

.disclaimer{font-size:.8rem;color:var(--muted-2);background:var(--surface);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;margin-top:14px;display:flex;gap:.6rem;align-items:flex-start}
.disclaimer svg{width:14px;height:14px;flex:0 0 auto;margin-top:2px;color:var(--muted)}

/* exec summary */
.exec{margin-top:28px}
.exec h3{font-size:1.06rem;display:flex;align-items:center;gap:.55rem}
.exec p{margin-top:.7rem;color:var(--ink-soft);font-size:1.04rem;line-height:1.62;letter-spacing:-.012em}
.exec .voice{display:inline-flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--muted);
  border:1px solid var(--line-2);border-radius:999px;padding:.25rem .6rem;margin-top:14px}

/* leak cards */
.leaks-head{display:flex;align-items:baseline;justify-content:space-between;margin:34px 0 14px}
.sec-label{font-size:.76rem;font-weight:720;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2)}
.leaklist{display:flex;flex-direction:column;gap:13px}
.leakcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:.16s}
.leakcard:hover{border-color:var(--line-2)}
/* the biggest leak reads more urgent than the rest */
.leaklist .leakcard:first-child{border-color:var(--leak-line);background:linear-gradient(180deg,rgba(223,106,67,.06),var(--surface))}
.lc-bar{height:3px;background:var(--leak)}
.lc-bar.amber{background:var(--amber)}
.lc-head{display:flex;align-items:flex-start;gap:14px;padding:20px 22px;cursor:pointer}
.lc-rank{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--leak-soft);border:1px solid var(--leak-line);
  color:var(--leak);font-weight:720;font-size:.92rem;display:grid;place-items:center}
.lc-mid{flex:1;min-width:0}
.lc-type{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.lc-title{font-size:1.12rem;font-weight:620;margin-top:.45rem;letter-spacing:-.02em}
.lc-impact{flex:0 0 auto;text-align:right}
.lc-impact .il{font-size:.72rem;color:var(--muted);font-weight:550}
.lc-impact .iv{font-size:1.5rem;font-weight:720;color:var(--leak);letter-spacing:-.03em;line-height:1}
.lc-chev{flex:0 0 auto;color:var(--muted-2);transition:.2s;margin-top:4px}
.leakcard.open .lc-chev{transform:rotate(180deg)}
.lc-body{max-height:0;overflow:hidden;transition:max-height .32s ease}
.leakcard.open .lc-body{max-height:680px}
.lc-inner{padding:0 22px 22px;border-top:1px solid var(--line);margin-top:0}
.lc-grid{display:grid;gap:16px;padding-top:18px}
.lc-block .bl{font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-bottom:.4rem}
.lc-block p{font-size:.95rem;color:var(--ink-soft);line-height:1.55}
.lc-action{background:var(--green-soft);border:1px solid var(--green-line);border-radius:12px;padding:15px 16px}
.lc-action .bl{color:var(--green)}
.lc-action p{color:#14794f}
.lc-foot{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;
  margin-top:4px;padding-top:14px;border-top:1px solid var(--line)}
.lc-save{font-size:.92rem;color:var(--ink-soft)}
.lc-save b{color:var(--green);font-weight:700}
@media(max-width:560px){
  .lc-head{padding:16px;gap:11px}
  .lc-title{font-size:1.02rem}
  .lc-impact .iv{font-size:1.25rem}
  .lc-inner{padding:0 16px 18px}
}

/* action checklist */
.actions{margin-top:34px;background:linear-gradient(180deg,var(--surface-2),var(--surface));
  border:1px solid var(--line-2);border-radius:var(--radius-lg);padding:26px}
.act-top{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:6px}
.act-tally{text-align:right}
.act-tally .t{font-size:.76rem;color:var(--muted)}
.act-tally .v{font-size:1.4rem;font-weight:720;color:var(--green);letter-spacing:-.03em}
.acts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.act{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:16px;transition:.15s}
.act:hover{border-color:var(--line-2)}
.act.checked{background:linear-gradient(180deg,rgba(95,199,148,.06),var(--surface));border-color:var(--green-line)}
.act .cb{flex:0 0 auto;width:23px;height:23px;border-radius:7px;border:1.5px solid var(--line-2);cursor:pointer;
  display:grid;place-items:center;transition:.15s;margin-top:1px}
.act .cb svg{width:13px;height:13px;color:#06210f;opacity:0;transition:.12s}
.act.checked .cb{background:var(--green);border-color:var(--green)}
.act.checked .cb svg{opacity:1}
.act-main{flex:1;min-width:0}
.act-main .at{font-size:1rem;font-weight:580;letter-spacing:-.01em}
.act.checked .at{text-decoration:line-through;text-decoration-color:var(--muted-2);color:var(--muted)}
.act-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}
.act-save{flex:0 0 auto;text-align:right;font-size:.92rem;color:var(--green);font-weight:680;white-space:nowrap}

/* owner notes */
.notes{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px}
.notes h3{font-size:1.06rem}
.notes p.q{color:var(--muted);font-size:.94rem;margin:.5rem 0 1rem}
.rep-foot{display:flex;gap:.7rem;margin-top:26px;flex-wrap:wrap;align-items:center}

/* report history */
.histlist{display:flex;flex-direction:column;gap:11px;margin-top:22px}
.histrow{display:grid;grid-template-columns:1.4fr 1fr 1fr auto auto;gap:16px;align-items:center;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;transition:.15s;cursor:pointer}
.histrow:hover{border-color:var(--line-2);background:var(--surface-2)}
.histrow .hweek{font-weight:600;font-size:.98rem}
.histrow .hweek small{display:block;color:var(--muted-2);font-size:.78rem;font-weight:400;margin-top:2px}
.histrow .hleak{font-size:1.15rem;font-weight:700;color:var(--leak);letter-spacing:-.02em}
.histrow .hcol .cl{font-size:.72rem;color:var(--muted-2);display:none}
@media(max-width:760px){
  .histrow{grid-template-columns:1fr auto;gap:10px}
  .histrow .hcol .cl{display:block;margin-bottom:2px}
  .histrow .hview{grid-column:1/-1}
  .histrow .hview .btn{width:100%}
}

/* settings */
.set-sec{margin-top:20px}
.set-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px}
.set-card h3{font-size:1.05rem;margin-bottom:.4rem}
.set-card .sd{color:var(--muted);font-size:.88rem;margin-bottom:18px}
.toggle{position:relative;width:44px;height:25px;border-radius:999px;background:var(--surface-3);border:1px solid var(--line-2);cursor:pointer;transition:.18s;flex:0 0 auto}
.toggle:after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:999px;background:var(--muted);transition:.18s}
.toggle.on{background:var(--green-soft);border-color:var(--green-line)}
.toggle.on:after{left:21px;background:var(--green)}
.togrow{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:14px 0;border-top:1px solid var(--line)}
.togrow:first-child{border-top:none}
.togrow .tt{font-size:.94rem;font-weight:550}
.togrow .td{font-size:.82rem;color:var(--muted);margin-top:2px}

/* billing */
.billcard{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line-2);
  border-radius:var(--radius-lg);padding:28px}
.bill-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.bill-plan{font-size:1.4rem;font-weight:680;letter-spacing:-.02em}
.bill-price{font-size:.94rem;color:var(--muted);margin-top:.3rem}
.bill-rows{margin-top:22px;border-top:1px solid var(--line)}
.bill-row{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);font-size:.92rem}
.bill-row .bk{color:var(--muted)}
.bill-row .bv{font-weight:560}
.bill-btns{display:flex;gap:.6rem;margin-top:22px;flex-wrap:wrap}

/* locked state */
.locked{text-align:center;max-width:460px;margin:40px auto;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius-lg);padding:40px 30px}
.locked .lk{width:52px;height:52px;border-radius:14px;background:var(--surface-2);border:1px solid var(--line-2);
  display:grid;place-items:center;margin:0 auto 18px;color:var(--muted)}
.locked h3{font-size:1.3rem}
.locked p{color:var(--muted);margin:.6rem auto 1.5rem;max-width:34ch}

/* empty state */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ei{width:46px;height:46px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);
  display:grid;place-items:center;margin:0 auto 14px;color:var(--muted-2)}

/* misc */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:#241f31;border:1px solid rgba(255,255,255,.12);color:#fff;padding:.8rem 1.2rem;border-radius:12px;
  font-size:.9rem;font-weight:550;z-index:200;transition:.25s;box-shadow:0 20px 40px -16px rgba(34,28,46,.5);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.steps-dots{display:flex;gap:.5rem;margin-bottom:24px}
.steps-dots .sd{flex:1;height:4px;border-radius:999px;background:var(--surface-3)}
.steps-dots .sd.on{background:var(--green)}
.ob-wrap{max-width:560px;margin:0 auto}
.ob-eyebrow{color:var(--muted);font-size:.84rem;font-weight:560;margin-bottom:.4rem}
.ob-h{font-size:1.7rem;letter-spacing:-.03em;margin-bottom:1.4rem}
.ob-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:30px}
.ob-foot{display:flex;justify-content:space-between;margin-top:24px;gap:1rem}
.chip-row{display:flex;gap:.5rem;flex-wrap:wrap}
.chip{border:1px solid var(--line-2);background:var(--bg-2);border-radius:999px;padding:.45rem .85rem;font-size:.86rem;
  color:var(--muted);cursor:pointer;transition:.13s;user-select:none}
.chip.on{background:var(--brand-soft);border-color:var(--brand-line);color:var(--brand)}
.ob-done{text-align:center;padding:14px 0}
.ob-done .big-tick{width:64px;height:64px;border-radius:999px;background:var(--green-soft);border:1px solid var(--green-line);
  color:var(--green);display:grid;place-items:center;margin:0 auto 20px}
.range-row{display:flex;align-items:center;gap:14px}
input[type=range]{flex:1;accent-color:var(--green)}
.range-val{font-size:1.1rem;font-weight:680;min-width:48px;text-align:right}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================================
   CONFIG — Supabase project + Stripe payment links
   ===================================================================== */
const SUPABASE_URL = "https://ovkjajxotxyhirwdbbsh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_WJSztgBeqP1b1rdJkffRLg_wrMyJ0mx"; // Supabase publishable key
const STRIPE_STARTER = "https://buy.stripe.com/YOUR-STARTER-LINK";
const STRIPE_PRO     = "https://buy.stripe.com/YOUR-PRO-LINK";
/* ===================================================================== */

const $ = function(s){return document.querySelector(s);};
const esc = function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
const money = function(n){return (Number(n)||0).toLocaleString();};
function num(v){v=parseFloat(String(v).replace(/[^0-9.\-]/g,''));return isNaN(v)?null:v;}
function int(v){v=parseInt(v,10);return isNaN(v)?null:v;}
function toast(t){var el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(function(){el.classList.remove('show');},2600);}
function inlineMsg(id,t,ok){var e=document.getElementById(id);if(!e)return;e.textContent=t;e.className='msg '+(ok?'ok':'err');}
function daypart(){var h=new Date().getHours();return h<12?'morning':h<18?'afternoon':'evening';}
function firstWord(n){return String(n||'').trim().split(/\s+/)[0]||'';}
function initials(n){return (String(n||'').trim().split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2)||'·').toUpperCase();}
function shortType(t){return String(t||'').replace(/ leaks?$/i,'')||'—';}
function sz(b){return b<1048576?Math.max(1,Math.round(b/1024))+' KB':(b/1048576).toFixed(1)+' MB';}
function defaultWeek(){var d=new Date();d.setDate(d.getDate()-d.getDay()+1-7);return d.toISOString().slice(0,10);}
function confCls(c){c=String(c||'').toLowerCase();return c.indexOf('high')>-1?'high':c.indexOf('low')>-1?'low':'medium';}
function confBars(c){return '<span class="conf '+confCls(c)+'"><span class="bars"><i></i><i></i><i></i></span> '+esc(c||'Medium')+'</span>';}

var sb=null, S={user:null,cafe:null,sub:null};
function cfgOK(){return SUPABASE_URL.indexOf('YOUR-PROJECT')===-1 && SUPABASE_ANON_KEY.indexOf('YOUR-ANON')===-1;}
if(cfgOK()){ sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{detectSessionInUrl:true,persistSession:true}}); }

function show(v){
  ['boot','login','onboarding'].forEach(function(id){document.getElementById(id).classList.toggle('hide',id!==v);});
  document.body.classList.toggle('app-mode',v==='app');
}
function planActive(){return S.sub && (S.sub.status==='active'||S.sub.status==='trialing');}
function planBadge(){var st=S.sub?S.sub.status:'none';return st==='active'?'<span class="badge b-green">Active</span>':st==='trialing'?'<span class="badge b-amber">Trial</span>':'<span class="badge b-muted">None</span>';}
function paintShell(){
  $('#sbCafeNm').textContent=S.cafe.name;
  $('#sbCafeLo').textContent=(S.cafe.location?S.cafe.location+' · ':'')+(S.sub?((S.sub.plan||'Starter')+' plan'):'No plan');
  $('#avatar').textContent=initials(S.cafe.name);
  $('#sbPlanTxt').textContent=(S.sub?(S.sub.plan||'Starter'):'No plan');
  $('#sbPlan').innerHTML=planBadge();
}

/* ---------- auth ---------- */
$('#loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  if(!sb){inlineMsg('loginMsg','Not connected.',0);return;}
  var email=$('#email').value.trim();var b=$('#loginBtn');b.disabled=true;b.textContent='Sending…';
  var r=await sb.auth.signInWithOtp({email:email,options:{emailRedirectTo:location.href.split('#')[0]}});
  b.disabled=false;b.textContent='Email me a sign-in link';
  if(r.error)inlineMsg('loginMsg',r.error.message,0); else inlineMsg('loginMsg','Check your inbox — link sent to '+email+'.',1);
});
$('#logout').addEventListener('click',async function(){await sb.auth.signOut();location.reload();});

async function boot(){
  if(!sb){show('login');return;}
  var s=(await sb.auth.getSession()).data.session;
  if(!s){show('login');return;}
  await afterLogin(s.user);
  sb.auth.onAuthStateChange(function(_e,sess){ if(!sess){location.reload();} });
}
async function afterLogin(user){
  S.user=user;
  var c=await sb.from('cafes').select('*').limit(1);
  if(c.error){show('login');return;}
  if(!c.data||!c.data.length){show('onboarding');return;}
  S.cafe=c.data[0];
  var sub=await sb.from('subscriptions').select('*').eq('cafe_id',S.cafe.id).maybeSingle();
  S.sub=sub.data||null;
  paintShell();
  show('app');
  go('dashboard');
}

/* ---------- onboarding ---------- */
$('#obFinish').addEventListener('click',async function(){
  if(!$('#ob-name').value.trim()){inlineMsg('obMsg','Please add your café name.',0);return;}
  var b=this;b.disabled=true;b.textContent='Setting up…';
  var cafe={owner_email:S.user.email.toLowerCase(),name:$('#ob-name').value.trim(),location:$('#ob-loc').value.trim(),
    opening_days:$('#ob-days').value.trim(),staff_count:int($('#ob-staff').value),avg_weekly_revenue:num($('#ob-rev').value),
    labour_target_pct:num($('#ob-lab').value)||30,food_target_pct:num($('#ob-food').value)||30,
    fixed_costs:{monthly:num($('#ob-fixed').value)||null},
    systems:{pos:$('#ob-pos').value.trim(),rostering:$('#ob-roster').value.trim(),accounting:$('#ob-acct').value.trim(),suppliers:$('#ob-supp').value.trim()}};
  var ins=await sb.from('cafes').insert(cafe).select().single();
  if(ins.error){b.disabled=false;b.textContent='Finish setup →';inlineMsg('obMsg',ins.error.message,0);return;}
  S.cafe=ins.data;
  await sb.from('subscriptions').insert({cafe_id:S.cafe.id,plan:'Starter',status:'trialing'});
  S.sub={status:'trialing',plan:'Starter'};
  paintShell();show('app');go('dashboard');
});

/* ---------- nav ---------- */
var TITLES={dashboard:'Dashboard',upload:'Upload centre',reports:'Reports',billing:'Billing',settings:'Settings'};
function go(p){
  document.querySelectorAll('#sbnav a[data-p]').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-p')===p);});
  $('#appTitle').textContent=TITLES[p]||'Leak';
  document.body.classList.remove('nav-open');
  window.scrollTo(0,0);
  if(p==='dashboard')renderDashboard();
  else if(p==='upload')renderUpload();
  else if(p==='reports')renderReports();
  else if(p==='billing')renderBilling();
  else if(p==='settings')renderSettings();
}
document.addEventListener('click',function(e){var a=e.target.closest('[data-p]');if(a){e.preventDefault();go(a.getAttribute('data-p'));}});
$('#burger').addEventListener('click',function(){document.body.classList.toggle('nav-open');});

/* ---------- shared render helpers ---------- */
function gauge(score){
  score=Math.max(0,Math.min(100,Math.round(Number(score)||0)));
  var deg=180*(1-score/100), rad=deg*Math.PI/180, cx=100, cy=108, len=62;
  var x2=(cx+len*Math.cos(rad)).toFixed(1), y2=(cy-len*Math.sin(rad)).toFixed(1);
  var slabel=score<40?'Leaking':score<70?'Watch':'Healthy';
  var scolor=score<40?'var(--leak)':score<70?'var(--amber)':'var(--green)';
  return '<div class="gauge-wrap"><svg viewBox="0 0 200 124" xmlns="http://www.w3.org/2000/svg">'+
    '<path d="M16,108 A84,84 0 0 1 184,108" fill="none" stroke="var(--surface-3)" stroke-width="16"/>'+
    '<path d="M16,108 A84,84 0 0 1 184,108" fill="none" stroke="var(--leak)" stroke-width="16" stroke-dasharray="86 178" stroke-dashoffset="0"/>'+
    '<path d="M16,108 A84,84 0 0 1 184,108" fill="none" stroke="var(--amber)" stroke-width="16" stroke-dasharray="86 178" stroke-dashoffset="-89"/>'+
    '<path d="M16,108 A84,84 0 0 1 184,108" fill="none" stroke="var(--green)" stroke-width="16" stroke-linecap="round" stroke-dasharray="86 178" stroke-dashoffset="-178"/>'+
    '<line x1="100" y1="108" x2="'+x2+'" y2="'+y2+'" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>'+
    '<circle cx="100" cy="108" r="6" fill="var(--ink)"/></svg>'+
    '<div class="gauge-val"><div class="score">'+score+'</div><div class="slabel" style="color:'+scolor+'">'+slabel+'</div></div></div>';
}
function donut(pct,target,name,foot){
  if(pct==null) return '';
  pct=Math.round(Number(pct)||0); target=Math.round(Number(target)||0);
  var C=289, dash=Math.min(pct,100)/100*C, over=pct-target;
  var color=over>3?'var(--leak)':over>0?'var(--amber)':'var(--green)';
  var pill=over>3?'<span class="pill bad">'+over+' points over</span>':over>0?'<span class="pill warn">just over</span>':'<span class="pill good">on target</span>';
  return '<div class="donut-card"><div class="dt">'+esc(name)+'</div><div class="donut"><svg width="124" height="124" viewBox="0 0 120 120">'+
    '<circle cx="60" cy="60" r="46" fill="none" stroke="var(--surface-3)" stroke-width="12"/>'+
    '<circle cx="60" cy="60" r="46" fill="none" stroke="'+color+'" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+dash.toFixed(0)+' '+C+'"/></svg>'+
    '<div class="dval"><b>'+pct+'%</b><small>Target '+target+'%</small></div></div>'+pill+'<div class="donut-foot">'+esc(foot||'')+'</div></div>';
}
function bars(leaks){
  var items=(leaks||[]).filter(function(l){return Number(l.impact)>0;});
  if(!items.length) return '';
  var max=Math.max.apply(null,items.map(function(l){return Number(l.impact);}));
  return '<div class="bars-h">'+items.map(function(l){
    var w=Math.max(8,Math.round(Number(l.impact)/max*100));
    return '<div class="barrow"><div class="blabel">'+esc(shortType(l.type||l.title))+'</div><div class="bartrack"><div class="barfill" style="width:'+w+'%"></div></div><div class="bval">$'+money(l.impact)+'</div></div>';
  }).join('')+'</div>';
}

/* ---------- dashboard ---------- */
async function renderDashboard(){
  var el=$('#appContent');el.innerHTML='<div class="spinner"></div>';
  var rep=await sb.from('reports').select('*').eq('cafe_id',S.cafe.id).order('week_starting',{ascending:false}).limit(1);
  var latest=(rep.data&&rep.data[0])||null;
  var h='<h1 class="greet">Good '+daypart()+(S.cafe?', '+esc(firstWord(S.cafe.name)):'')+'.</h1>';
  if(latest && !planActive()){
    h+='<div class="locked"><div class="lk"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div><h3>Your report is ready</h3><p>Choose a plan to unlock your weekly profit review.</p><button class="btn btn-primary btn-lg" data-p="billing">Choose a plan</button></div>';
    el.innerHTML=h;return;
  }
  if(!latest){
    h+='<p class="meta-line" style="margin-top:.6rem">Welcome to Leak — let’s find your first leak.</p>'+
       '<div class="dash-card"><div class="dash-h">Get your first review</div><div class="dash-sub" style="margin-bottom:16px">Upload last week’s sales export, supplier invoices and roster — all in one go. Your report lands in about 30 seconds.</div><button class="btn btn-primary" data-p="upload">Upload last week’s files →</button></div>';
    el.innerHTML=h;return;
  }
  var d=latest.data||{}, m=d.metrics||{};
  h+='<p class="meta-line" style="margin-top:.6rem">Latest review · '+esc(latest.week_label||'')+(d.generated?' <span class="dotsep"></span> '+esc(d.generated):'')+'</p>';
  h+='<div class="dash-card"><div class="dash-h">Profit health</div><div class="dash-sub">How this week sits against a healthy week for your café.</div><div class="health"><div>'+gauge(latest.health_score)+'<div class="gscale"><span>0</span><span>Leaking</span><span>100</span></div></div><div class="health-copy"><p>'+esc(latest.summary||'')+'</p></div></div></div>';
  h+='<div class="kpis">'+
    '<div class="kpi"><div class="k">Money leaking this week</div><div class="v leak">$'+money(latest.estimated_leak)+'</div><div class="meta">'+(d.annual?esc(d.annual):'')+'</div></div>'+
    '<div class="kpi"><div class="k">Biggest leak</div><div class="v" style="font-size:1.35rem">'+esc((d.leaks&&d.leaks[0]&&shortType(d.leaks[0].type))||'—')+'</div><div class="meta">'+((d.leaks&&d.leaks[0]&&Number(d.leaks[0].impact))?'$'+money(d.leaks[0].impact)+'/wk':'')+'</div></div>'+
    '<div class="kpi"><div class="k">Labour</div><div class="v '+(m.labour_pct>m.labour_target?'leak':'green')+'">'+(m.labour_pct!=null?m.labour_pct+'%':'—')+'</div><div class="meta">Target '+(m.labour_target||30)+'%</div></div>'+
    '<div class="kpi"><div class="k">Food cost</div><div class="v '+(m.food_pct>m.food_target?'leak':'green')+'">'+(m.food_pct!=null?m.food_pct+'%':'—')+'</div><div class="meta">Target '+(m.food_target||30)+'%</div></div>'+
    '</div>';
  if(m.labour_pct!=null||m.food_pct!=null){
    var prime=(Number(m.labour_pct)||0)+(Number(m.food_pct)||0);
    var primeT=(Number(m.labour_target)||30)+(Number(m.food_target)||30);
    h+='<div style="margin-top:26px;display:flex;align-items:baseline;justify-content:space-between;gap:1rem;flex-wrap:wrap"><div class="dash-h">Your numbers vs target</div><span class="meta-line">'+esc(latest.week_label||'')+'</span></div>'+
       '<div class="donuts">'+donut(m.labour_pct,m.labour_target||30,'Labour','Wages incl. super ÷ sales')+donut(m.food_pct,m.food_target||30,'Food cost','Supplier COGS ÷ sales')+donut(prime,primeT,'Prime cost','Labour + food combined')+'</div>';
  }
  h+='<div class="latest" data-p="reports" style="cursor:pointer;margin-top:26px"><span class="eyebrow" style="color:var(--muted)">Latest Leak Weekly report</span><div class="latest-row" style="margin-top:14px"><div><div class="lh">Estimated money leaking this week</div><div class="lv"><span class="cur">$</span>'+money(latest.estimated_leak)+'</div><div class="lmeta"><div>'+esc(latest.week_label||'')+'</div><div>Top leak: <b>'+esc((d.leaks&&d.leaks[0]&&shortType(d.leaks[0].type))||'—')+'</b></div><div>Confidence: <b>'+esc(latest.confidence||'Medium')+'</b></div></div></div><a class="btn btn-primary" data-p="reports">View report →</a></div></div>';
  var barsHtml=bars(d.leaks);
  if(barsHtml)h+='<div class="dash-card"><div class="dash-h">Where it leaked this week</div><div class="dash-sub">$'+money(latest.estimated_leak)+' in total — biggest first.</div>'+barsHtml+'<button class="btn btn-primary btn-sm" style="margin-top:20px" data-p="reports">See the fixes for each →</button></div>';
  h+='<div class="quick"><button class="btn btn-ghost" data-p="upload">Upload this week’s files</button><button class="btn btn-quiet" data-p="reports">Report history</button></div>';
  el.innerHTML=h;
}

/* ---------- upload ---------- */
var UP={files:{}};
function renderUpload(){
  UP={files:{}};
  var cats=[['supplier','Supplier invoices','Milk, coffee, produce, bakery'],['pos','POS sales report','Daily sales + item mix'],['roster','Roster / wages','Rostered + actual hours'],['other','Anything else','Notes, photos, menu costings']];
  var h='<h1 class="greet" style="font-size:1.5rem">Upload last week’s numbers.</h1>'+
    '<p class="gsub" style="max-width:56ch;color:var(--muted);margin-top:.4rem">Add your supplier invoices, POS sales export and roster/wages report — ideally all in one go. Leak reviews them together and prepares your weekly profit report.</p>'+
    '<div class="grid2" style="margin-top:22px"><div class="field"><label class="f">Week starting</label><input class="input" id="upWeek" type="date" value="'+defaultWeek()+'"></div><div></div></div>'+
    '<div class="up-cats">'+cats.map(function(c){return '<div class="upcard" data-cat="'+c[0]+'"><div class="uh"><span class="un">'+c[1]+'</span><span class="badge b-muted" data-badge="'+c[0]+'">Add files</span></div><div class="ud">'+c[2]+'</div><div class="files" data-files="'+c[0]+'"></div></div>';}).join('')+'</div>'+
    '<div class="field" style="margin-top:18px"><label class="f">Anything we should know? (rain, public holiday, a big function…)</label><textarea class="textarea" id="upNotes" placeholder="e.g. Rained all week so Tues/Wed were quiet — that’s weather, not staffing."></textarea></div>'+
    '<div class="up-note">You don’t need perfect files. Leak works with what you have and flags anything unclear. Adding more files to the same week tops up — it won’t wipe what you already sent.</div>'+
    '<div class="msg" id="upMsg"></div>'+
    '<div style="display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-top:6px"><button class="btn btn-primary btn-lg" id="upSubmit">Send my files for review</button><button class="btn btn-quiet btn-lg" data-p="dashboard">Cancel</button></div>';
  $('#appContent').innerHTML=h;
  $('#upSubmit').addEventListener('click',submitUpload);
}
function pickFiles(cat){window.__cat=cat;var fp=$('#filePicker');fp.value='';fp.click();}
$('#filePicker').addEventListener('change',function(){
  var cat=window.__cat;if(!cat||!this.files.length)return;
  UP.files[cat]=UP.files[cat]||[];
  var box=document.querySelector('[data-files="'+cat+'"]');
  for(var i=0;i<this.files.length;i++){var f=this.files[i];UP.files[cat].push(f);
    box.insertAdjacentHTML('beforeend','<span class="fchip"><svg><use href="#check"/></svg> '+esc(f.name)+' <span class="fsz">'+sz(f.size)+'</span></span>');}
  var card=document.querySelector('.upcard[data-cat="'+cat+'"]');if(card)card.classList.add('has');
  var badge=document.querySelector('[data-badge="'+cat+'"]');if(badge){badge.className='badge b-green';badge.innerHTML='<span class="badge-dot"></span> '+UP.files[cat].length+' added';}
});
async function submitUpload(){
  var any=Object.keys(UP.files).some(function(k){return UP.files[k]&&UP.files[k].length;});
  if(!any){inlineMsg('upMsg','Add at least one file first.',0);return;}
  var b=$('#upSubmit');b.disabled=true;b.textContent='Uploading…';
  var week=$('#upWeek').value||defaultWeek();
  try{
    // merge with any files already on this week so a second batch doesn't wipe the first
    var ex=await sb.from('weekly_inputs').select('files,context').eq('cafe_id',S.cafe.id).eq('week_starting',week).maybeSingle();
    var uploaded=(ex.data&&ex.data.files)?ex.data.files.slice():[];
    for(var cat in UP.files){ for(var i=0;i<UP.files[cat].length;i++){var f=UP.files[cat][i];
      var path=S.cafe.id+'/'+week+'/'+cat+'-'+Date.now()+'-'+f.name.replace(/[^\w.\-]/g,'_');
      var up=await sb.storage.from('cafe-files').upload(path,f);
      if(up.error)throw up.error; uploaded.push({path:path,label:cat,size:f.size});
    }}
    var notes=$('#upNotes').value.trim()||((ex.data&&ex.data.context&&ex.data.context.notes)||'');
    var row={cafe_id:S.cafe.id,week_starting:week,status:'ready',files:uploaded,context:{notes:notes}};
    var r=await sb.from('weekly_inputs').upsert(row,{onConflict:'cafe_id,week_starting'}).select('id').single();
    if(r.error)throw r.error;
    try{ sb.functions.invoke('analyze-report',{body:{weekly_input_id:r.data.id}}); }catch(_){}
    b.textContent='Sent ✓'; toast('Files sent — building your review');
    inlineMsg('upMsg','Got it — your review is being prepared and will appear under Reports in about 30 seconds.',1);
  }catch(err){ b.disabled=false;b.textContent='Send my files for review'; inlineMsg('upMsg',(err&&err.message)||'Upload failed.',0); }
}

/* ---------- reports ---------- */
var REPS=[];
async function renderReports(){
  var el=$('#appContent');el.innerHTML='<h1 class="greet" style="font-size:1.5rem">Reports</h1><div class="spinner"></div>';
  if(!planActive()){
    el.innerHTML='<div class="locked"><div class="lk"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div><h3>Choose a plan to unlock your reviews</h3><p>$99/month, cancel anytime.</p><button class="btn btn-primary btn-lg" data-p="billing">See plans</button></div>';
    return;
  }
  var r=await sb.from('reports').select('*').eq('cafe_id',S.cafe.id).order('week_starting',{ascending:false});
  REPS=r.data||[];
  if(!REPS.length){
    el.innerHTML='<h1 class="greet" style="font-size:1.5rem">Reports</h1><div class="empty"><div class="ei"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3v5h5"/><path d="M7 3h7l5 5v13H7z"/></svg></div><p>No reviews yet — your first one appears here once it’s ready.</p><button class="btn btn-primary" style="margin-top:14px" data-p="upload">Upload files →</button></div>';
    return;
  }
  var h='<h1 class="greet" style="font-size:1.5rem">Reports</h1><div class="histlist">'+REPS.map(function(rp,i){return histRow(rp,i);}).join('')+'</div><div id="repDetail" style="margin-top:32px"></div>';
  el.innerHTML=h;
  viewReportByIndex(0);
}
function histRow(rp,i){
  var top=(rp.data&&rp.data.leaks&&rp.data.leaks[0])?shortType(rp.data.leaks[0].type):'—';
  return '<div class="histrow" data-i="'+i+'"><div class="hweek">'+esc(rp.week_label||'')+'<small>'+(rp.published===false?'Draft · flagged for review':esc((rp.data&&rp.data.generated)||''))+'</small></div>'+
    '<div class="hcol"><div class="cl">Estimated leak</div><div class="hleak">$'+money(rp.estimated_leak)+'</div></div>'+
    '<div class="hcol"><div class="cl">Biggest leak</div><span class="badge b-leak"><span class="badge-dot"></span> '+esc(top)+'</span></div>'+
    '<div class="hcol"><div class="cl">Confidence</div>'+confBars(rp.confidence)+'</div>'+
    '<div class="hview"><button class="btn btn-ghost btn-sm" data-i="'+i+'">View →</button></div></div>';
}
function leakCard(l,i){
  var type=l.type||'Leak', isWaste=/waste/i.test(type);
  return '<div class="leakcard'+(i===0?' open':'')+'"><div class="lc-bar'+(isWaste?' amber':'')+'"></div>'+
    '<div class="lc-head"><div class="lc-rank">'+(i+1)+'</div><div class="lc-mid"><div class="lc-type"><span class="badge '+(isWaste?'b-amber':'b-leak')+'"><span class="badge-dot"></span> '+esc(type)+'</span></div><div class="lc-title">'+esc(l.title||'')+'</div></div>'+
    '<div class="lc-impact"><div class="il">Impact</div><div class="iv">$'+money(l.impact)+'</div></div>'+
    '<svg class="lc-chev" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>'+
    '<div class="lc-body"><div class="lc-inner"><div class="lc-grid">'+
    (l.what?'<div class="lc-block"><div class="bl">What’s going on</div><p>'+esc(l.what)+'</p></div>':'')+
    (l.why?'<div class="lc-block"><div class="bl">Why it matters</div><p>'+esc(l.why)+'</p></div>':'')+
    (l.action?'<div class="lc-action"><div class="bl">What I’d do</div><p>'+esc(l.action)+'</p></div>':'')+
    (l.saving?'<div class="lc-foot"><div class="lc-save">Estimated saving <b>'+esc(l.saving)+'</b></div></div>':'')+
    '</div></div></div></div>';
}
function viewReportByIndex(i){
  var rp=REPS[i];if(!rp)return;
  var d=rp.data||{}, leaks=d.leaks||[], acts=d.actions||[];
  var h='<div class="report">';
  if(rp.published===false){
    h+='<div class="dq"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg><div class="dqt"><b>Draft — flagged for review.</b> Some figures looked incomplete, so this one hasn’t auto-published. '+((d.validation_issues&&d.validation_issues.length)?'Notes: '+esc(d.validation_issues.join('; '))+'.':'')+'</div></div>';
  }
  h+='<div class="headline"><div class="lbl"><svg class="drop" style="width:15px;height:15px"><use href="#drop"/></svg> Estimated money leaking — '+esc(rp.week_label||'')+'</div>'+
     '<div class="big"><span class="cur">$</span>'+money(rp.estimated_leak)+'</div>'+
     (d.annual?'<div class="annual">≈ <b>'+esc(d.annual)+'</b></div>':'')+
     '<div class="headline-foot">'+confBars(rp.confidence)+'<span class="meta-line">'+esc(d.generated||'')+'</span></div></div>';
  if(rp.summary)h+='<div class="exec"><h3><svg class="drop" style="width:16px;height:16px"><use href="#drop"/></svg> The week in one read</h3><p>'+esc(rp.summary)+'</p><span class="voice">Reviewed the way an experienced operator would — not an accountant.</span></div>';
  if(leaks.length)h+='<div class="leaks-head"><span class="sec-label">Biggest leaks this week</span><span class="hint">Tap a card for the full breakdown</span></div><div class="leaklist">'+leaks.map(leakCard).join('')+'</div>';
  if(acts.length)h+='<div class="actions"><div class="act-top"><div><span class="sec-label">Fix next week</span><h3 style="font-size:1.3rem;margin-top:.5rem">'+acts.length+' action'+(acts.length>1?'s':'')+'.</h3></div></div><div class="acts">'+acts.map(function(a){return '<div class="act"><div class="cb"><svg><use href="#check"/></svg></div><div class="act-main"><div class="at">'+esc(a)+'</div></div></div>';}).join('')+'</div></div>';
  h+='<div class="disclaimer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg> Operational guidance based on the numbers you shared — not accounting advice. Private to your café.</div></div>';
  $('#repDetail').innerHTML=h;
  document.querySelectorAll('.histrow[data-i]').forEach(function(r){r.style.outline='';});
  var cur=document.querySelector('.histrow[data-i="'+i+'"]');if(cur)cur.style.outline='2px solid var(--brand-line)';
  $('#repDetail').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ---------- billing ---------- */
function renderBilling(){
  var st=S.sub?S.sub.status:'none';
  var badge=st==='active'?'<span class="badge b-green"><span class="badge-dot"></span> Active</span>':st==='trialing'?'<span class="badge b-amber"><span class="badge-dot"></span> Free trial</span>':'<span class="badge b-muted"><span class="badge-dot"></span> Inactive</span>';
  var stColor=st==='active'?'var(--green)':st==='trialing'?'#9a7218':'var(--muted)';
  var h='<h1 class="greet" style="font-size:1.5rem">Billing</h1>'+
    '<div class="billcard" style="margin-top:22px"><div class="bill-top"><div>'+badge+'<div class="bill-plan" style="margin-top:.7rem">Leak '+esc((S.sub&&S.sub.plan)||'—')+'</div><div class="bill-price">'+(st==='trialing'?'Free trial · no card charged yet':st==='active'?'$99/month · 1 café':'No active plan')+' · '+esc(S.cafe.name)+'</div></div></div>'+
    '<div class="bill-rows"><div class="bill-row"><span class="bk">Status</span><span class="bv" style="color:'+stColor+'">'+esc(st)+'</span></div><div class="bill-row"><span class="bk">Billing email</span><span class="bv">'+esc(S.user.email)+'</span></div></div></div>'+
    '<div class="set-sec"><div class="set-card"><h3>Choose your plan</h3><div class="sd">Simple monthly pricing. Cancel anytime.</div>'+
    '<div class="grid2">'+
    '<div class="set-card" style="margin:0"><div class="eyebrow">Starter</div><div class="bill-plan" style="margin:.3rem 0">$99<span style="font-size:1rem;color:var(--muted);font-weight:500">/mo</span></div><p class="hint" style="margin:0 0 1rem">Weekly profit review · labour, food &amp; pricing leaks · report history.</p><a class="btn btn-primary btn-block" href="'+STRIPE_STARTER+'" target="_blank" rel="noopener">Choose Starter</a></div>'+
    '<div class="set-card" style="margin:0;border-color:var(--brand-line)"><div class="eyebrow" style="color:var(--brand)">Pro</div><div class="bill-plan" style="margin:.3rem 0">$199<span style="font-size:1rem;color:var(--muted);font-weight:500">/mo</span></div><p class="hint" style="margin:0 0 1rem">Everything in Starter · deeper recommendations · monthly trend · priority review.</p><a class="btn btn-primary btn-block" href="'+STRIPE_PRO+'" target="_blank" rel="noopener">Choose Pro</a></div>'+
    '</div></div></div>'+
    '<p class="hint" style="margin-top:14px">After you subscribe, your reviews unlock automatically once payment is confirmed.</p>';
  $('#appContent').innerHTML=h;
}

/* ---------- settings ---------- */
function renderSettings(){
  var c=S.cafe, sys=c.systems||{}, fx=c.fixed_costs||{};
  var h='<h1 class="greet" style="font-size:1.5rem">Settings</h1><p class="gsub" style="color:var(--muted);margin-top:.4rem">Keep your café profile and targets accurate so reports stay sharp.</p>'+
    '<div class="set-sec"><div class="set-card"><h3>Café profile</h3><div class="sd">The basics Leak uses to read your week.</div>'+
    '<div class="grid2"><div class="field"><label class="f">Café name</label><input class="input" id="se-name" value="'+esc(c.name)+'"></div><div class="field"><label class="f">Location</label><input class="input" id="se-loc" value="'+esc(c.location||'')+'"></div></div>'+
    '<div class="grid2"><div class="field"><label class="f">Avg weekly sales ($)</label><input class="input" id="se-rev" type="number" value="'+esc(c.avg_weekly_revenue||'')+'"></div><div class="field" style="margin-bottom:0"><label class="f">Monthly fixed costs ($)</label><input class="input" id="se-fixed" type="number" value="'+esc(fx.monthly||'')+'"></div></div></div></div>'+
    '<div class="set-sec"><div class="set-card"><h3>Targets</h3><div class="sd">Leak measures your week against these.</div>'+
    '<div class="grid2"><div class="field" style="margin-bottom:0"><label class="f">Labour target %</label><input class="input" id="se-lab" type="number" value="'+esc(c.labour_target_pct||30)+'"></div><div class="field" style="margin-bottom:0"><label class="f">Food cost target %</label><input class="input" id="se-food" type="number" value="'+esc(c.food_target_pct||30)+'"></div></div></div></div>'+
    '<div class="set-sec"><div class="set-card"><h3>Systems &amp; suppliers</h3><div class="sd">Helps Leak recognise your files.</div>'+
    '<div class="grid2"><div class="field"><label class="f">POS</label><input class="input" id="se-pos" value="'+esc(sys.pos||'')+'"></div><div class="field" style="margin-bottom:0"><label class="f">Main suppliers</label><input class="input" id="se-supp" value="'+esc(sys.suppliers||'')+'"></div></div></div></div>'+
    '<div class="msg" id="seMsg"></div><div style="margin-top:18px"><button class="btn btn-primary" id="seSave">Save changes</button></div>';
  $('#appContent').innerHTML=h;
  $('#seSave').addEventListener('click',async function(){
    var upd={name:$('#se-name').value.trim(),location:$('#se-loc').value.trim(),avg_weekly_revenue:num($('#se-rev').value),labour_target_pct:num($('#se-lab').value),food_target_pct:num($('#se-food').value),fixed_costs:Object.assign({},fx,{monthly:num($('#se-fixed').value)}),systems:Object.assign({},sys,{pos:$('#se-pos').value.trim(),suppliers:$('#se-supp').value.trim()})};
    var r=await sb.from('cafes').update(upd).eq('id',c.id);
    if(r.error)inlineMsg('seMsg',r.error.message,0); else {Object.assign(S.cafe,upd);paintShell();inlineMsg('seMsg','Saved.',1);toast('Settings saved');}
  });
}

/* ---------- delegated interactions inside the content area ---------- */
$('#appContent').addEventListener('click',function(e){
  var up=e.target.closest('.upcard[data-cat]'); if(up){pickFiles(up.getAttribute('data-cat'));return;}
  var lc=e.target.closest('.lc-head'); if(lc){lc.closest('.leakcard').classList.toggle('open');return;}
  var hist=e.target.closest('.histrow[data-i]'); if(hist){viewReportByIndex(+hist.getAttribute('data-i'));return;}
  var act=e.target.closest('.act'); if(act){act.classList.toggle('checked');return;}
});

boot();
</script>
